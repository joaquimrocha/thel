name: Build thel binary
description: Compile the release binary and package it as a Linux tar.xz.

inputs:
  version:
    description: Optional version string to embed in the tarball name.
    required: false
    default: ""

outputs:
  tarball:
    description: Path to the packaged tar.xz.
    value: ${{ steps.package.outputs.tarball }}

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
      with:
        version: 10

    - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        node-version: 20
        cache: pnpm

    - shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          libwebkit2gtk-4.1-dev libgtk-3-dev libsoup-3.0-dev librsvg2-dev \
          libssl-dev libayatana-appindicator3-dev \
          build-essential pkg-config

    - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

    - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      with:
        workspaces: src-tauri

    - shell: bash
      run: pnpm install --frozen-lockfile

    # Bundling is off in tauri.conf (bundle.active=false); --no-bundle makes it
    # explicit. beforeBuildCommand (pnpm build = tsc + vite) runs as part.
    - shell: bash
      run: pnpm tauri build --no-bundle

    - id: package
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
      run: |
        bin=src-tauri/target/release/thel
        test -f "$bin" || { echo "binary not found at $bin" >&2; exit 1; }
        if [ -n "$VERSION" ]; then
          tarball="thel-${VERSION}-linux-x86_64.tar.xz"
        else
          tarball="thel-linux-x86_64.tar.xz"
        fi
        # tar the binary alone (keeps the executable bit).
        tar -cJf "$tarball" -C "$(dirname "$bin")" "$(basename "$bin")"
        echo "tarball=$tarball" >> "$GITHUB_OUTPUT"
